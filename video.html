  <style>
    :root{ --bg:#07080b; --fg:rgba(255,255,255,.92); --stroke:rgba(255,255,255,.12); }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.35 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      display:grid;
      place-items:center;
      padding: 18px;
    }
    .card{
      width:min(980px, 100%);
      border:1px solid var(--stroke);
      border-radius: 22px;
      background: rgba(10,12,18,.55);
      overflow:hidden;
      box-shadow: 0 30px 100px rgba(0,0,0,.55);
    }
    .video{
      display:block;
      width:100%;
      height:auto;
      background:#000;
    }
    .bar{
      padding: 14px 14px 16px;
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .title{
      margin:0;
      font-weight: 850;
      letter-spacing: -0.01em;
    }
    .sub{
      margin: 2px 0 0 0;
      opacity:.78;
      font-size: 13px;
    }
    .btn{
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.92);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration:none;
      font-weight: 750;
      display:inline-flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }
    .btn:hover{ border-color: rgba(255,255,255,.28); }
  </style>
</head>
<body>
  <div class="card">
    <video class="video" controls playsinline preload="metadata">
      <source src="https://bafybeid7y2rqqfwnv25lq6xi2zyd3cps3hyjy4mznmt3o2p4b7qochwo2y.ipfs.dweb.link?filename=Can%20You%20Feel%20This(1).mp4" type="video/mp4">
    </video>
    <div class="bar">
      <div>
        <p class="title">Can You Feel This? — Promo Video</p>
        <p class="sub">Fletcher Christian • Dropping everywhere March 6</p>
      </div>
      <a class="btn" href="./index.html">Back to the release page →</a>
    </div>
  </div>

  <script>
    // Populate og:url dynamically so previews have a canonical URL
    const ogUrl = document.querySelector('meta[property="og:url"]');
    if (ogUrl) ogUrl.setAttribute("content", window.location.href);
  </script>
</body>
</html>
